<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Landing -->
  <rect x="220" y="20" width="160" height="40" rx="6" fill="#2563eb" stroke="#1d4ed8" stroke-width="2"/>
  <text x="300" y="46" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Landing</text>

  <!-- Arrow down -->
  <line x1="300" y1="60" x2="300" y2="90" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Home -->
  <rect x="200" y="90" width="200" height="50" rx="8" fill="#f0f4ff" stroke="#2563eb" stroke-width="2"/>
  <text x="300" y="112" text-anchor="middle" fill="#1e3a8a" font-size="13" font-weight="bold">Home (Hero)</text>
  <text x="300" y="130" text-anchor="middle" fill="#64748b" font-size="11">"I build secure, production-ready APIs"</text>

  <!-- Arrow from Home to Work -->
  <line x1="300" y1="140" x2="300" y2="170" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Work -->
  <rect x="175" y="170" width="250" height="65" rx="8" fill="#f0f4ff" stroke="#2563eb" stroke-width="2"/>
  <text x="300" y="192" text-anchor="middle" fill="#1e3a8a" font-size="13" font-weight="bold">Work (Case Studies)</text>
  <text x="300" y="210" text-anchor="middle" fill="#475569" font-size="11">• API Security Audit — before/after</text>
  <text x="300" y="225" text-anchor="middle" fill="#475569" font-size="11">• Production-Ready API Build</text>

  <!-- Arrow from Work to About -->
  <line x1="300" y1="235" x2="300" y2="265" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- About -->
  <rect x="200" y="265" width="200" height="50" rx="8" fill="#f0f4ff" stroke="#2563eb" stroke-width="2"/>
  <text x="300" y="287" text-anchor="middle" fill="#1e3a8a" font-size="13" font-weight="bold">About</text>
  <text x="300" y="305" text-anchor="middle" fill="#475569" font-size="11">Why security, my process, my tools</text>

  <!-- Arrow from About to Contact -->
  <line x1="300" y1="315" x2="300" y2="345" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Contact / CV -->
  <rect x="175" y="345" width="250" height="50" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="300" y="367" text-anchor="middle" fill="#166534" font-size="13" font-weight="bold">Contact / CV</text>
  <text x="300" y="385" text-anchor="middle" fill="#166534" font-size="11">⬇ Download CV + Send a message</text>

  <!-- Label -->
  <rect x="215" y="425" width="170" height="30" rx="15" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="300" y="445" text-anchor="middle" fill="#64748b" font-size="11">← The one action</text>
  <line x1="215" y1="440" x2="175" y2="370" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="175" y1="370" x2="175" y2="440" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="175" y1="440" x2="215" y2="440" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="150" y="405" text-anchor="end" fill="#ef4444" font-size="10" font-style="italic">everything</text>
  <text x="150" y="418" text-anchor="end" fill="#ef4444" font-size="10" font-style="italic">leads here</text>

  <!-- X-out pages I left out -->
  <line x1="470" y1="100" x2="530" y2="140" stroke="#dc2626" stroke-width="2" opacity="0.5"/>
  <line x1="530" y1="100" x2="470" y2="140" stroke="#dc2626" stroke-width="2" opacity="0.5"/>
  <text x="500" y="95" text-anchor="middle" fill="#dc2626" font-size="12">✗ Blog</text>

  <line x1="470" y1="200" x2="530" y2="240" stroke="#dc2626" stroke-width="2" opacity="0.5"/>
  <line x1="530" y1="200" x2="470" y2="240" stroke="#dc2626" stroke-width="2" opacity="0.5"/>
  <text x="500" y="195" text-anchor="middle" fill="#dc2626" font-size="12">✗ Skills bars</text>

  <line x1="470" y1="300" x2="530" y2="340" stroke="#dc2626" stroke-width="2" opacity="0.5"/>
  <line x1="530" y1="300" x2="470" y2="340" stroke="#dc2626" stroke-width="2" opacity="0.5"/>
  <text x="500" y="295" text-anchor="middle" fill="#dc2626" font-size="12">✗ Testimonials</text>
</svg>
